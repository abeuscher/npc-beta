; Large-upload limits — baked into the image (conf.d/zz-uploads.ini) so
; they apply on EVERY stack incl. prod + worker, where local.ini is not
; mounted. The `zz-` prefix sorts after local.ini so this is authoritative
; even in dev/e2e where local.ini is bind-mounted. Sized with headroom over
; the 512 MB Filament form cap (multipart overhead) so bundle / theme /
; media imports work off-local. See docker/php/local.ini for the dev-only
; opcache toggle (kept separate; not baked).
upload_max_filesize = 768M
post_max_size = 768M

max_execution_time = 1200
max_input_time = 1200

memory_limit = 1G
