; Upload limits — needed for Twill media library
upload_max_filesize = 64M
post_max_size = 64M

; Execution time — covers long-running imports
max_execution_time = 300
max_input_time = 300

; Memory
memory_limit = 256M

; Timezone
date.timezone = UTC

; OPcache — disabled in dev for instant code changes, enable in production
opcache.enable = 0
