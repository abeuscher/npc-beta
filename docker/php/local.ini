; Upload limits — needed for Twill media library
upload_max_filesize = 64M
post_max_size = 64M

; Execution time — covers long-running imports
max_execution_time = 300
max_input_time = 300

; Memory — 1G headroom for the full Pest suite (1800+ tests in one process; 256M OOMs in CI)
memory_limit = 1G

; Timezone
date.timezone = UTC

; OPcache — disabled in dev for instant code changes, enable in production
opcache.enable = 0
