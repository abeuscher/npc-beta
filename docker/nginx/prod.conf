server {
    listen 80;
    server_name beuscher.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name beuscher.net;
    root /var/www/html/public;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/beuscher.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beuscher.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # mTLS — required only on /api/health and /api/logs (Fleet Manager agent endpoints).
    # The trusted client cert is bind-mounted from /opt/nonprofitcrm/nginx-certs/
    # and pasted by the operator before first nginx start (see runbook).
    ssl_verify_client      optional;
    ssl_client_certificate /etc/nginx/certs/fm-client.crt;
    ssl_verify_depth       1;

    # Max upload size — covers media library uploads
    client_max_body_size 64M;

    # mTLS gate — strict on /api/health and /api/logs, transparent on everything else.
    location = /api/health {
        if ($ssl_client_verify != "SUCCESS") { return 403; }
        try_files $uri /index.php?$query_string;
    }

    location = /api/logs {
        if ($ssl_client_verify != "SUCCESS") { return 403; }
        try_files $uri /index.php?$query_string;
    }

    # Route all requests through Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM passthrough
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Block access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static asset caching — try disk first, fall back to PHP for dynamic assets (e.g. Livewire JS)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        try_files $uri /index.php?$query_string;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
