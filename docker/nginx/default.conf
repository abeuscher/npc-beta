server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Max upload size — covers media library uploads
    client_max_body_size 64M;

    # Route all requests through Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM passthrough
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Block access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static asset caching — try disk first, fall back to PHP for dynamic assets (e.g. Livewire JS)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        try_files $uri /index.php?$query_string;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS + mTLS — required for the Fleet Manager agent endpoint.
# /api/health requires a valid client cert; everything else serves unconditionally.
# Server cert (localhost.{crt,key}) is generated locally via bin/dev-certs.sh
# and is gitignored. fm-client.crt ships as a placeholder in the repo.
server {
    listen 443 ssl;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    ssl_verify_client      optional;
    ssl_client_certificate /etc/nginx/certs/fm-client.crt;
    ssl_verify_depth       1;

    client_max_body_size 64M;

    # mTLS gate — strict on /api/health, transparent on everything else.
    location = /api/health {
        if ($ssl_client_verify != "SUCCESS") { return 403; }
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        try_files $uri /index.php?$query_string;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
