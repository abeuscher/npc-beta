name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and validate build version
        id: tag
        run: |
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file is missing at the repository root."
            exit 1
          fi
          VER="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s' "$VER" | grep -Eq '^0\.[0-9]+\.[0-9]+$'; then
            echo "::error::VERSION must be a pre-1.0 string of the form 0.X.Y (got: '$VER')."
            exit 1
          fi
          echo "IMAGE_TAG=$VER" >> "$GITHUB_OUTPUT"

      - name: Enforce immutable version tag
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
        run: |
          IMG="ghcr.io/${{ github.repository_owner }}/nonprofitcrm-app:${IMAGE_TAG}"
          if docker manifest inspect "$IMG" >/dev/null 2>&1; then
            echo "::error::Version ${IMAGE_TAG} is already published. Version tags are immutable — bump VERSION before merging to main."
            exit 1
          fi
          echo "Version ${IMAGE_TAG} is unpublished; proceeding."

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_pgsql, gd, zip, intl, bcmath, redis
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Build widget bundle via build server
        if: ${{ vars.BUILD_SERVER_URL != '' }}
        continue-on-error: true
        env:
          BUILD_SERVER_URL: ${{ vars.BUILD_SERVER_URL }}
          BUILD_SERVER_API_KEY: ${{ secrets.BUILD_SERVER_API_KEY }}
        run: php artisan build:public

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          build-args: |
            BUILD_ENV=${{ vars.BUILD_ENV || 'production' }}
            APP_VERSION=${{ steps.tag.outputs.IMAGE_TAG }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nonprofitcrm-app:${{ steps.tag.outputs.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/nonprofitcrm-app:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nonprofitcrm-web:${{ steps.tag.outputs.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/nonprofitcrm-web:latest

      - name: Copy compose file to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/nonprofitcrm/

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/nonprofitcrm
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --wait --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T app php artisan widgets:sync
            docker compose -f docker-compose.prod.yml exec -T app php artisan help:sync
            docker compose -f docker-compose.prod.yml exec -T app php artisan storage:link
            docker compose -f docker-compose.prod.yml exec -T app php artisan view:clear
            docker compose -f docker-compose.prod.yml exec -T app php artisan config:clear
            docker compose -f docker-compose.prod.yml exec -T app php artisan build:public || true
            docker image prune -af
