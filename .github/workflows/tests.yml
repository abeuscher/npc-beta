name: Tests

on:
  push:
    # DIAGNOSTIC (temporary, A003): "!ci-logs/**" keeps the Playwright
    # digest push from re-triggering this workflow. Restore to just
    # ["**"] when the diagnostic plumbing is removed.
    branches: ["**", "!ci-logs/**"]
  pull_request:
    branches: [main]

# Fast suite first (quick signal), then the slow group, then a single
# aggregate "Tests" gate that branch protection on main can require. This
# workflow only runs tests — it never builds/publishes images, reads or
# writes VERSION, or deploys, so it cannot race deploy.yml / deploy-demo.yml.

jobs:
  fast:
    name: Fast suite
    # DIAGNOSTIC (temporary, A003): Pest jobs disabled so a push runs
    # ONLY Playwright (faster CI signal). Restore by removing this `if:`.
    if: false
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nonprofitcrm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, redis
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies and build assets
        run: npm ci && npm run build

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Alias the postgres service hostname for the forced phpunit env
        run: echo "127.0.0.1 postgres" | sudo tee -a /etc/hosts

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: nonprofitcrm_test
          DB_USERNAME: postgres
          DB_PASSWORD: Password123
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Run fast suite (first signal)
        run: php artisan test --parallel --exclude-group=slow
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: nonprofitcrm_test
          DB_USERNAME: postgres
          DB_PASSWORD: Password123
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  slow:
    name: Slow suite
    # DIAGNOSTIC (temporary, A003): disabled — restore by removing this `if:`.
    if: false
    needs: fast
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nonprofitcrm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, redis
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies and build assets
        run: npm ci && npm run build

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Alias the postgres service hostname for the forced phpunit env
        run: echo "127.0.0.1 postgres" | sudo tee -a /etc/hosts

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: nonprofitcrm_test
          DB_USERNAME: postgres
          DB_PASSWORD: Password123
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Run slow group
        run: php artisan test --group=slow
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: nonprofitcrm_test
          DB_USERNAME: postgres
          DB_PASSWORD: Password123
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  # Playwright e2e against the isolated stack (docker-compose.e2e.yml). Runs
  # AFTER the Pest jobs (needs: slow) so Pest and Playwright never run
  # concurrently within a single CI run — the same never-run-them-together
  # rule that holds locally, honoured here too. This is the same faithful
  # isolated stack used locally; the harness targets it purely via env, so no
  # e2e spec or helper changes are CI-specific.
  #
  # Un-parked (e2e-stabilization): the suite is green on the isolated stack —
  # the QUARANTINED_SPECS quarantine has been deleted and the shared CI-only
  # causes fixed (Composer dev-deps in the e2e image; the Vite build volume
  # mounted into nginx; runtime-SCSS warm-up before the suite). It runs and
  # reports on every push but is intentionally NOT in the `tests` merge-gate
  # `needs` — kept non-gating by design (Playwright variance should not block
  # every merge to main); promote into `tests.needs` only as a separate,
  # deliberate decision.
  playwright:
    name: Playwright e2e (isolated stack)
    # DIAGNOSTIC (temporary, A003): `needs: slow` dropped so a push runs
    # ONLY this job (Pest jobs are `if: false` above; a skipped dependency
    # would otherwise skip this job too). On handback this MUST be restored
    # to `needs: slow`.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies and Playwright chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare .env for the isolated stack
        run: |
          cp .env.example .env
          {
            echo "APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
            echo "DB_PASSWORD=postgres"
            echo "ADMIN_EMAIL=admin@example.com"
            echo "ADMIN_PASSWORD=password"
            echo "ADMIN_NAME=Admin"
            echo "UID=$(id -u)"
            echo "GID=$(id -g)"
          } >> .env

      - name: Generate local TLS cert for nginx
        run: bash bin/dev-certs.sh

      # --wait blocks until the postgres healthcheck (pg_isready) passes, so
      # the DB-independent /up gate and the migrate:fresh step below can't
      # race Postgres startup ("Connection refused").
      - name: Bring up the isolated e2e stack
        run: docker compose -p nonprofitcrm_e2e -f docker-compose.e2e.yml up -d --build --wait

      - name: Wait for the e2e site
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8090/up || true)
            if [ "$code" = "200" ]; then echo "e2e site ready after $((i*10))s"; exit 0; fi
            sleep 10
          done
          echo "e2e site did not become ready in 600s" >&2
          docker compose -p nonprofitcrm_e2e -f docker-compose.e2e.yml logs --tail=120
          exit 1

      # The readiness probe hits /up — Laravel's framework health route
      # (bootstrap/app.php `withRouting(health: '/up')`). It returns 200 as
      # soon as PHP-FPM/nginx can serve, without booting the Filament panel
      # or touching the DB. (NOT /admin/login: the panel provider reads
      # SiteSetting on boot, so /admin/* 500s with `relation "site_settings"
      # does not exist` until the schema exists — which would hang this gate
      # the full 600s and the migrate step below would never run.)
      # With a DB-independent gate the order is correct: wait → migrate+seed
      # → Playwright. globalSetup's own migrate:fresh stays (idempotent;
      # keeps local runs self-contained).
      - name: Migrate + seed the e2e database
        run: |
          for i in 1 2 3; do
            if docker compose -p nonprofitcrm_e2e -f docker-compose.e2e.yml exec -T app php artisan migrate:fresh --seed --force; then
              echo "migrate:fresh --seed ok (attempt $i)"; exit 0
            fi
            echo "migrate attempt $i failed; retrying in 10s" >&2
            sleep 10
          done
          echo "migrate:fresh --seed failed after 3 attempts" >&2
          docker compose -p nonprofitcrm_e2e -f docker-compose.e2e.yml logs --tail=100
          exit 1

      # Readiness gate: Playwright globalSetup must be able to log in, so
      # the admin login page has to actually serve its form first. Poll the
      # REAL precondition (HTTP 200 AND an email field present) — not a
      # proxy like /up. Transient/warming codes (000/502/503) keep waiting;
      # a persistent 500 means the app booted but errors (not a warmup
      # issue) so bail early. Either failure path dumps full diagnostics so
      # a genuine bug is distinguishable from slow warmup in one run.
      - name: Wait for the admin login page
        run: |
          fail500=0
          for i in $(seq 1 24); do
            code=$(curl -s -o /tmp/login.html -w '%{http_code}' http://localhost:8090/admin/login || echo 000)
            if [ "$code" = "200" ] && grep -Eq 'type="?email"?' /tmp/login.html; then
              echo "admin login ready after $((i*10))s"; exit 0
            fi
            if [ "$code" = "500" ]; then fail500=$((fail500+1)); else fail500=0; fi
            if [ "$fail500" -ge 3 ]; then
              echo "persistent HTTP 500 — app boots but errors (not a warmup issue)" >&2
              break
            fi
            echo "admin login not ready (HTTP $code), attempt $i/24"
            sleep 10
          done
          echo "::error::/admin/login never served its form — diagnostics follow" >&2
          echo "--- last status / headers ---"; curl -sS -o /dev/null -D - -w 'http_code=%{http_code}\n' http://localhost:8090/admin/login || true
          echo "--- body (first 3000 bytes) ---"; head -c 3000 /tmp/login.html || true; echo
          echo "--- app container logs (tail) ---"
          docker compose -p nonprofitcrm_e2e -f docker-compose.e2e.yml logs app --tail=150 || true
          echo "--- laravel.log: last error (class + message + top frames) ---"
          docker compose -p nonprofitcrm_e2e -f docker-compose.e2e.yml exec -T app sh -c 'grep -aE "local\.(ERROR|CRITICAL)" storage/logs/laravel.log 2>/dev/null | tail -n1 | head -c 2500' || true
          echo
          exit 1

      # Warm the runtime-SCSS cache. The public layout compiles template
      # custom_scss via ScssPhp at request time and caches it in Redis; the
      # first cold public render in the fresh e2e container is slow enough to
      # blow tight in-browser timeouts. Hit the seeded public pages a few
      # times so the compile is paid and cached before the timed suite,
      # making cold-sensitive specs (e.g. event-registration) reliable.
      # Best-effort: never fails the job.
      - name: Warm the runtime-SCSS cache (seeded public pages)
        run: |
          for path in / /news; do
            for n in 1 2 3; do
              code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8090${path}" || echo 000)
              echo "warm ${path} attempt ${n}: HTTP ${code}"
            done
          done
          true

      # DIAGNOSTIC (temporary, A003): capture JSON + full stdout without
      # failing the step, so the digest can publish even on failure. On
      # handback restore to the single line:
      #   run: npm run test:e2e:isolated -- --project=chromium
      - name: Run Playwright (chromium) against the isolated stack
        run: |
          set +e
          PLAYWRIGHT_JSON_OUTPUT_NAME=playwright-results.json \
            npm run test:e2e:isolated -- --project=chromium --reporter=list,json 2>&1 \
            | tee pw-stdout.txt
          echo "${PIPESTATUS[0]}" > pw-rc.txt
          echo "Playwright exit code: $(cat pw-rc.txt)"

      # DIAGNOSTIC (temporary, A003): publish a compact digest + trimmed
      # stdout + raw JSON + in-container probes (laravel.log tail, build
      # state including widget bundle manifest, delivered HTML head) to
      # the `ci-logs/playwright` branch so the cloud agent can read CI
      # results via the GitHub API. Fast-forward only, never force.
      # Removed entirely on handback.
      - name: Publish Playwright digest to ci-logs ref
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p out
          cp playwright-results.json out/results.json 2>/dev/null || echo '{}' > out/results.json
          tail -c 250000 pw-stdout.txt > out/stdout.txt 2>/dev/null || true
          cp pw-rc.txt out/rc.txt 2>/dev/null || echo unknown > out/rc.txt
          node scripts/ci/pw-digest.mjs playwright-results.json > out/digest.md 2>/dev/null \
            || echo "(digest generation failed — see stdout.txt)" > out/digest.md
          # In-container probes: laravel error log, public-build / widget
          # bundle state (the A002 contract ships widget CSS/JS via
          # public/build/widgets/manifest.json), delivered HTML head of
          # the seeded home and the admin login page.
          DC="docker compose -p nonprofitcrm_e2e -f docker-compose.e2e.yml exec -T app"
          $DC sh -c 'tail -c 120000 storage/logs/laravel.log' > out/laravel-log.txt 2>&1 || true
          $DC sh -c '
            echo "== public/build (ls) =="; ls -la public/build 2>&1;
            echo; echo "== public/build/manifest.json (Vite, head) =="; head -c 3000 public/build/manifest.json 2>&1;
            echo; echo "== public/build/assets (count + head) =="; ls public/build/assets 2>&1 | wc -l; ls -la public/build/assets 2>&1 | head -20;
            echo; echo "== public/build/widgets (ls) =="; ls -la public/build/widgets 2>&1;
            echo; echo "== public/build/widgets/manifest.json (head) =="; head -c 2000 public/build/widgets/manifest.json 2>&1;
          ' > out/build-state.txt 2>&1 || true
          curl -s http://localhost:8090/ 2>&1 | sed -n '1,140p' > out/public-home-head.txt 2>&1 || true
          curl -s -o /dev/null -w 'home_http=%{http_code}\n' http://localhost:8090/ >> out/public-home-head.txt 2>&1 || true
          curl -s http://localhost:8090/admin/login 2>&1 | sed -n '1,90p' > out/admin-login-head.txt 2>&1 || true
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git clone --quiet --branch ci-logs/playwright "$REPO_URL" cilogs 2>/dev/null; then
            cd cilogs
          else
            mkdir cilogs && cd cilogs && git init -q && git checkout -q -b ci-logs/playwright
          fi
          git config user.email "ci@example.com"
          git config user.name "ci-bot"
          mkdir -p "runs/${GITHUB_SHA}"
          cp ../out/* "runs/${GITHUB_SHA}/"
          rm -rf latest && mkdir -p latest && cp ../out/* latest/
          git add -A
          git commit -qm "playwright diagnostic ${GITHUB_SHA}" || echo "nothing to commit"
          for i in 1 2 3 4; do
            if git push --quiet "$REPO_URL" HEAD:ci-logs/playwright; then
              echo "published digest to ci-logs/playwright (runs/${GITHUB_SHA} + latest/)"
              exit 0
            fi
            echo "push attempt $i failed; merging remote and retrying" >&2
            git pull --quiet --no-rebase "$REPO_URL" ci-logs/playwright || true
            sleep $((2 ** i))
          done
          echo "::warning::could not publish digest to ci-logs/playwright" >&2

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Tear down the isolated stack
        if: always()
        run: docker compose -p nonprofitcrm_e2e -f docker-compose.e2e.yml down -v

      # DIAGNOSTIC (temporary, A003): make the job conclusion reflect the
      # real Playwright result, but only AFTER the digest is published.
      # Removed on handback. Last step so `if: always()` steps above always
      # run.
      - name: Reflect Playwright result
        if: always()
        run: |
          rc=$(cat pw-rc.txt 2>/dev/null || echo 1)
          echo "Playwright exit code was: $rc"
          exit "$rc"

  # Single stable status check for branch protection on `main`. Require the
  # job named "Tests" (workflow "Tests") so a branch cannot merge unless the
  # fast + slow Pest suites passed. Keep this job named exactly "Tests" —
  # branch protection on main requires it. The Playwright e2e job runs on
  # every push but is intentionally NOT in `needs` — kept non-gating by
  # design (see the playwright job comment + sessions/298 + 299 close
  # handoffs + the e2e-stabilization handback).
  tests:
    name: Tests
    # DIAGNOSTIC (temporary, A003): disabled — restore by removing this `if:`.
    if: false
    needs: [fast, slow]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: echo "Fast + slow Pest suites passed — full Pest coverage green."
