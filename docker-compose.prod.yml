services:

  # ─────────────────────────────────────────
  # PHP-FPM Application
  # ─────────────────────────────────────────
  app:
    image: ghcr.io/${GHCR_OWNER}/nonprofitcrm-app:${IMAGE_TAG:-latest}
    container_name: nonprofitcrm_app
    restart: unless-stopped
    env_file: .env
    # bootstrap/cache is deliberately NOT a persistent volume — it holds only
    # derived, image-specific files (packages.php/services.php/compiled). A
    # persistent mount let a manifest written by a pre-image survive an image
    # swap and shadow the new image's vendor (the 0.345.06 Debugbar deploy
    # brick). The image bakes + chowns the dir, so no mount is needed.
    # BootstrapCacheVolumeTest guards against re-adding it.
    volumes:
      - storage_data:/var/www/html/storage
      - widget_build:/var/www/html/public/build/widgets
      - libs_build:/var/www/html/public/build/libs
    networks:
      - nonprofitcrm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ─────────────────────────────────────────
  # Nginx Web Server
  # ─────────────────────────────────────────
  nginx:
    image: ghcr.io/${GHCR_OWNER}/nonprofitcrm-web:${IMAGE_TAG:-latest}
    container_name: nonprofitcrm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - storage_data:/var/www/html/storage
      - widget_build:/var/www/html/public/build/widgets:ro
      - libs_build:/var/www/html/public/build/libs:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/nonprofitcrm/nginx-certs:/etc/nginx/certs:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nonprofitcrm
    depends_on:
      - app

  # ─────────────────────────────────────────
  # PostgreSQL Database
  #
  # The major version here MUST match the `postgresql-client-N` apt package
  # pinned in the Dockerfile (spatie/laravel-backup runs pg_dump from the
  # app container against this server; mismatched majors produce dumps the
  # older server cannot ingest). The PostgresVersionSkewTest in
  # tests/Feature/Infrastructure/ catches drift mechanically. Bumping the
  # major is destructive — PostgreSQL N+1 will refuse to start on a
  # PostgreSQL N data directory. See the "Need to wipe and start over"
  # section of docs/deployment/digital-ocean-droplet-install.md.
  # ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: nonprofitcrm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nonprofitcrm}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nonprofitcrm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─────────────────────────────────────────
  # Queue Worker
  # ─────────────────────────────────────────
  worker:
    image: ghcr.io/${GHCR_OWNER}/nonprofitcrm-app:${IMAGE_TAG:-latest}
    container_name: nonprofitcrm_worker
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    # bootstrap/cache deliberately not persisted here either — see the app
    # service note above.
    volumes:
      - storage_data:/var/www/html/storage
    networks:
      - nonprofitcrm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ─────────────────────────────────────────
  # Redis Cache & Queue
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nonprofitcrm_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - nonprofitcrm

# ─────────────────────────────────────────
# Named Volumes (persistent data)
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  storage_data:
  widget_build:
  libs_build:

# ─────────────────────────────────────────
# Internal Network
# ─────────────────────────────────────────
networks:
  nonprofitcrm:
    driver: bridge
