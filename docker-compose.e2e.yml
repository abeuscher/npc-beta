# Isolated e2e stack — a faithful, port-shifted duplicate of the dev stack with
# its own throwaway Postgres + Redis volumes, so Playwright runs collision-free
# alongside the dev stack and the Pest parallel suite (Pest on the dev stack's
# per-worker test DBs, Playwright here — no shared DB/FPM, the never-run-them-
# together hazard dissolved for the cross-stack case).
#
# Reuses the dev-built image (nonprofitcrm-app:latest) and the repo bind-mount:
# no second checkout, no second image build. The `build:` block only fires on a
# fresh machine where that tag is absent.
#
# Bring up / tear down:
#   ./dev e2e:up      (or  npm run e2e:up )
#   ./dev e2e:down
#
# The e2e harness targets this stack purely via env (see tests/e2e/helpers/
# stack.ts): E2E_COMPOSE_PROJECT, E2E_COMPOSE_FILES, E2E_DB_PORT, APP_URL.

name: nonprofitcrm_e2e

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: nonprofitcrm-app:latest
    container_name: nonprofitcrm_e2e_app
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      APP_URL: http://localhost:8090
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - app_node_modules_e2e:/var/www/html/node_modules
      - app_vendor_e2e:/var/www/html/vendor
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: nonprofitcrm_e2e_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx-certs:/etc/nginx/certs:ro
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: nonprofitcrm_e2e_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nonprofitcrm}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - postgres_data_e2e:/var/lib/postgresql/data
    ports:
      - "5442:5432"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: nonprofitcrm-app:latest
    container_name: nonprofitcrm_e2e_worker
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      APP_URL: http://localhost:8090
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      # Own vendor volume — must NOT share app_vendor_e2e with the app
      # service: on a fresh runner Docker populates an empty named volume
      # from the image, and two services mounting the same fresh volume
      # race that copy ("mkdir vendor/openspout/openspout: file exists"),
      # failing `compose up`. One populator per volume = deterministic.
      - worker_vendor_e2e:/var/www/html/vendor
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:7-alpine
    container_name: nonprofitcrm_e2e_redis
    restart: unless-stopped
    volumes:
      - redis_data_e2e:/data

volumes:
  postgres_data_e2e:
  redis_data_e2e:
  app_node_modules_e2e:
  app_vendor_e2e:
  worker_vendor_e2e:
