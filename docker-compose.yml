services:

  # ─────────────────────────────────────────
  # PHP-FPM Application
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: nonprofitcrm_app
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - app_node_modules:/var/www/html/node_modules
    networks:
      - nonprofitcrm
    depends_on:
      - postgres
      - redis

  # ─────────────────────────────────────────
  # Nginx Web Server
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nonprofitcrm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - nonprofitcrm
    depends_on:
      - app

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nonprofitcrm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nonprofitcrm}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nonprofitcrm

  # ─────────────────────────────────────────
  # Queue Worker
  # ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: nonprofitcrm_worker
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - nonprofitcrm
    depends_on:
      - postgres
      - redis

  # ─────────────────────────────────────────
  # Redis Cache & Queue
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nonprofitcrm_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - nonprofitcrm

# ─────────────────────────────────────────
# Named Volumes (persistent data)
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  app_node_modules:

# ─────────────────────────────────────────
# Internal Network
# ─────────────────────────────────────────
networks:
  nonprofitcrm:
    driver: bridge
